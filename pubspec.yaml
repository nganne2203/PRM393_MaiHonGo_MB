name: maihongo
description: Japanese vocabulary learning app — Flutter starter generated from Figma Make.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  flip_card: ^0.7.0
  confetti: ^0.8.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.1.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  flutter_riverpod: ^2.6.1
  google_sign_in: ^6.2.2
  http_parser: ^4.0.2
  just_audio: ^0.9.42
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  record: ^6.2.1
  flutter_dotenv: ^6.0.1

  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - .env
